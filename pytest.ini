[tool:pytest]
# Pytest configuration for OTT test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum required pytest version
minversion = 6.0

# Add current directory to Python path
pythonpath = .

# Default command line options
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings

# Test markers
markers =
    drm: marks tests as DRM tests (for filtering)
    non_drm: marks tests as non-DRM tests (for filtering)
    slow: marks tests as slow (deselect with '-m "not slow"')
    sequential: marks tests that must run sequentially

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test timeout (in seconds)
timeout = 600

# JUnit XML output format
junit_family = xunit2