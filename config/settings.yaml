base_results_dir: "./TestResults"

# Parental Lock Configuration
parental_lock:
  app_package: "tv.accedo.studio.paytv.tatasky"
  pin: "0000"                          # 4-digit parental PIN
  appium_url: "http://localhost:4723"
  navigation:
    up_presses: 1                      # presses UP from home to reach settings row
    right_presses: 4                   # presses RIGHT to reach User Preferences
  home_check:
    logo_file: "Home.png"
    region: [90, 120, 260, 180]        # x, y, width, height
    threshold: 0.60
    max_attempts: 4
  ui_ids:
    title: "textViewTitle"
    parental_controls_btn: "buttonParentalControls"
    pin_title: "page_title"
    channel_lock_menu_item: "menu_item"
    channel_row: "android:id/content"
    checkbox: "cb"
    channel_name: "channelName"
    channel_number: "channelNumber"
  max_down_search: 30                  # max DOWN presses to find Parental Controls
  max_right_search: 10                 # max RIGHT presses to find Channel Lock tab
  max_no_new_scrolls: 3               # stop scrolling after N scrolls with no new channels
  max_scroll_iterations: 30            # absolute cap on total scroll iterations
  channels_to_lock: 10                  # number of channels to lock (0 = lock ALL channels)

# Favourite Channels Configuration
favourite_channels:
  app_package: "tv.accedo.studio.paytv.tatasky"
  appium_url: "http://localhost:4723"
  navigation:
    up_presses: 1                      # presses UP from home to reach settings row
    right_presses: 4                   # presses RIGHT to reach User Preferences
  home_check:
    logo_file: "Home.png"
    region: [90, 120, 260, 180]        # x, y, width, height
    threshold: 0.60
    max_attempts: 4
  ui_ids:
    title: "textViewTitle"
    user_settings_btn: "buttonUserSettings"
    menu_item: "menu_item"
    deselect_all_btn: "deselectAllButton"
    parent_layout: "parentLayout"
    snackbar: "snackbar_top_layout"
    channel_name: "channelName"
    channel_number: "channelNumber"
  max_right_favourites: 150             # max RIGHT presses when selecting channels
  channels_to_favourite: 0             # number of channels to favourite (0 = ALL until snackbar)

# Remote Pairing Configuration
remote_pairing:
  appium_url: "http://localhost:4723"
  navigation:
    up_presses: 1                      # presses UP from home to reach settings row
    right_presses: 3                   # presses RIGHT to reach Android TV Settings
  home_check:
    logo_file: "Home.png"
    region: [90, 120, 260, 180]        # x, y, width, height
    threshold: 0.60
    max_attempts: 4
  ui_ids:
    settings_title: "com.android.tv.settings:id/decor_title"
    menu_item_title: "android:id/title"
    list_id: "com.android.tv.settings:id/list"
    summary: "android:id/summary"
  expected_texts:
    settings: "Settings"
    remotes_accessories: "Remotes and accessories"
    connected: "Connected"
    searching: "Searching for accessories"
  max_back_presses: 10                 # max BACK presses to return to home screen

